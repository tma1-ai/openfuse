# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
service:
  auth: true
  base-path: /api/public
  endpoints:
    get:
      docs: Get Project associated with API key (requires project-scoped API key).
      method: GET
      path: /projects
      response: Projects

types:
  Projects:
    properties:
      data: list<Project>

  Organization:
    properties:
      id:
        type: string
        docs: The unique identifier of the organization
      name:
        type: string
        docs: The name of the organization

  Project:
    properties:
      id: string
      name: string
      organization:
        type: Organization
        docs: The organization this project belongs to
      metadata:
        type: map<string, unknown>
        docs: Metadata for the project
      retentionDays:
        type: optional<integer>
        docs: Number of days to retain data. Null or 0 means no retention. Omitted if no retention is configured.
